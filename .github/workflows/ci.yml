name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Shellcheck
        run: shellcheck lib/cache-restore.sh lib/cache-save.sh

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore against non-existent cache dir (cold start)
        id: restore-cold
        uses: ./
        with:
          path: /tmp/test-cold-restore
          key: any-key
          cache-dir: /tmp/nonexistent-cache-dir

      - name: Verify cold start exits cleanly with miss
        run: |
          [ "${{ steps.restore-cold.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false on cold start, got: ${{ steps.restore-cold.outputs.cache-hit }}" && exit 1)
          [ ! -d /tmp/test-cold-restore ] \
            || (echo "Expected path to not exist on cold-start miss" && exit 1)
          echo "Cold start restore: OK"

      - name: Create test fixture
        run: |
          mkdir -p /tmp/test-source
          echo "hello" > /tmp/test-source/a.txt
          echo "world" > /tmp/test-source/b.txt
          mkdir -p /tmp/test-source/sub
          echo "nested" > /tmp/test-source/sub/c.txt

      - name: Save to local cache
        uses: ./save
        with:
          path: /tmp/test-source
          key: test-exact-key
          cache-dir: /tmp/local-cache

      - name: Verify entry was created
        run: |
          test -d /tmp/local-cache/entries/test-exact-key || (echo "Entry not found" && exit 1)
          echo "Entry exists: OK"

      - name: Delete source to prove restore works
        run: rm -rf /tmp/test-source

      - name: Restore from local cache (exact)
        id: restore-exact
        uses: ./
        with:
          path: /tmp/test-restore
          key: test-exact-key
          cache-dir: /tmp/local-cache

      - name: Verify exact restore
        run: |
          [ "${{ steps.restore-exact.outputs.cache-hit }}" = "true" ] \
            || (echo "Expected cache-hit=true, got: ${{ steps.restore-exact.outputs.cache-hit }}" && exit 1)
          [ "${{ steps.restore-exact.outputs.cache-matched-key }}" = "test-exact-key" ] \
            || (echo "Expected cache-matched-key=test-exact-key, got: ${{ steps.restore-exact.outputs.cache-matched-key }}" && exit 1)
          diff /tmp/local-cache/entries/test-exact-key /tmp/test-restore \
            || (echo "Restored content does not match" && exit 1)
          echo "Exact restore: OK"

      - name: Restore with prefix key (miss on exact, hit on prefix)
        id: restore-prefix
        uses: ./
        with:
          path: /tmp/test-restore-prefix
          key: test-exact-key-v2
          restore-keys: |
            test-exact-key
          cache-dir: /tmp/local-cache

      - name: Verify prefix restore
        run: |
          [ "${{ steps.restore-prefix.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for prefix match, got: ${{ steps.restore-prefix.outputs.cache-hit }}" && exit 1)
          [ -n "${{ steps.restore-prefix.outputs.cache-matched-key }}" ] \
            || (echo "Expected non-empty cache-matched-key for prefix match" && exit 1)
          diff /tmp/local-cache/entries/test-exact-key /tmp/test-restore-prefix \
            || (echo "Prefix-restored content does not match" && exit 1)
          echo "Prefix restore: OK"

      - name: Restore with no match
        id: restore-miss
        uses: ./
        with:
          path: /tmp/test-restore-miss
          key: no-such-key
          cache-dir: /tmp/local-cache

      - name: Verify cache miss
        run: |
          [ "${{ steps.restore-miss.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for miss, got: ${{ steps.restore-miss.outputs.cache-hit }}" && exit 1)
          [ -z "${{ steps.restore-miss.outputs.cache-matched-key }}" ] \
            || (echo "Expected empty cache-matched-key on miss, got: ${{ steps.restore-miss.outputs.cache-matched-key }}" && exit 1)
          [ ! -d /tmp/test-restore-miss ] \
            || (echo "Expected path to not exist on miss" && exit 1)
          echo "Cache miss: OK"

      - name: Second save with same key is a no-op
        uses: ./save
        with:
          path: /tmp/test-restore
          key: test-exact-key
          cache-dir: /tmp/local-cache

      - name: Verify idempotent save
        run: |
          count=$(ls /tmp/local-cache/entries/ | wc -l | tr -d ' ')
          [ "$count" = "1" ] \
            || (echo "Expected 1 cache entry, found: $count" && exit 1)
          echo "Idempotent save: OK"

      - name: Save with non-existent source path exits cleanly
        uses: ./save
        with:
          path: /tmp/this-path-does-not-exist
          key: nonexistent-source-key
          cache-dir: /tmp/local-cache

      - name: Verify non-existent source was not cached
        run: |
          [ ! -d /tmp/local-cache/entries/nonexistent-source-key ] \
            || (echo "Expected no entry for non-existent source" && exit 1)
          echo "Non-existent source guard: OK"

      - name: Set up multi-prefix fixture
        run: |
          mkdir -p /tmp/test-multi-prefix
          echo "multi" > /tmp/test-multi-prefix/d.txt

      - name: Save multi-prefix fixture under second prefix
        uses: ./save
        with:
          path: /tmp/test-multi-prefix
          key: prefix-b-v1
          cache-dir: /tmp/local-cache

      - name: Restore with multiple restore-keys (first misses, second hits)
        id: restore-multi-prefix
        uses: ./
        with:
          path: /tmp/test-restore-multi-prefix
          key: no-match-at-all
          restore-keys: |
            prefix-a-
            prefix-b-
          cache-dir: /tmp/local-cache

      - name: Verify second prefix was used
        run: |
          [ "${{ steps.restore-multi-prefix.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for prefix match" && exit 1)
          diff /tmp/local-cache/entries/prefix-b-v1 /tmp/test-restore-multi-prefix \
            || (echo "Multi-prefix restored content does not match" && exit 1)
          echo "Multi-prefix restore: OK"

      - name: Set up first-prefix-wins fixture
        run: |
          mkdir -p /tmp/test-prefix-a
          echo "from-prefix-a" > /tmp/test-prefix-a/e.txt

      - name: Save first-prefix-wins fixture under prefix-a
        uses: ./save
        with:
          path: /tmp/test-prefix-a
          key: prefix-a-v1
          cache-dir: /tmp/local-cache

      - name: Restore with multiple restore-keys (both match, first wins)
        id: restore-prefix-order
        uses: ./
        with:
          path: /tmp/test-restore-prefix-order
          key: no-match-at-all-2
          restore-keys: |
            prefix-a-
            prefix-b-
          cache-dir: /tmp/local-cache

      - name: Verify first prefix wins when both match
        run: |
          [ "${{ steps.restore-prefix-order.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for prefix match" && exit 1)
          # prefix-a- is listed first and has an entry; it must win over prefix-b-
          diff /tmp/local-cache/entries/prefix-a-v1 /tmp/test-restore-prefix-order \
            || (echo "Expected prefix-a-v1 to win but content does not match" && exit 1)
          echo "First-prefix-wins: OK"

      - name: Set up key-sanitization fixture
        run: |
          mkdir -p /tmp/test-special-key
          echo "special" > /tmp/test-special-key/f.txt

      - name: Save with key containing special characters
        uses: ./save
        with:
          path: /tmp/test-special-key
          key: "my/special:key@v1"
          cache-dir: /tmp/local-cache

      - name: Verify sanitized entry name on disk
        run: |
          # "/" ":" "@" must all become "_"; the on-disk name is the sanitized form
          [ -d "/tmp/local-cache/entries/my_special_key_v1" ] \
            || (echo "Expected sanitized entry my_special_key_v1 not found" && exit 1)
          echo "Key sanitization: OK"

      - name: Restore with sanitized key (exact hit)
        id: restore-sanitized
        uses: ./
        with:
          path: /tmp/test-restore-sanitized
          key: "my/special:key@v1"
          cache-dir: /tmp/local-cache

      - name: Verify sanitized key restores correctly
        run: |
          [ "${{ steps.restore-sanitized.outputs.cache-hit }}" = "true" ] \
            || (echo "Expected cache-hit=true for sanitized key, got: ${{ steps.restore-sanitized.outputs.cache-hit }}" && exit 1)
          diff /tmp/local-cache/entries/my_special_key_v1 /tmp/test-restore-sanitized \
            || (echo "Sanitized-key restore content mismatch" && exit 1)
          echo "Sanitized key restore: OK"

      - name: Dot-key restore is rejected
        id: restore-dot
        continue-on-error: true
        uses: ./
        with:
          path: /tmp/test-dot-restore
          key: "."
          cache-dir: /tmp/local-cache

      - name: Verify dot-key was rejected
        run: |
          [ "${{ steps.restore-dot.outcome }}" = "failure" ] \
            || (echo "Expected dot-key restore to fail but it succeeded" && exit 1)
          echo "Dot-key restore rejection: OK"

      - name: Double-dot key restore is rejected
        id: restore-dotdot
        continue-on-error: true
        uses: ./
        with:
          path: /tmp/test-dotdot-restore
          key: ".."
          cache-dir: /tmp/local-cache

      - name: Verify double-dot key was rejected
        run: |
          [ "${{ steps.restore-dotdot.outcome }}" = "failure" ] \
            || (echo "Expected .. key restore to fail but it succeeded" && exit 1)
          echo "Double-dot key restore rejection: OK"

      - name: Dash-prefix restore-key is handled safely
        id: restore-dash-prefix
        uses: ./
        with:
          path: /tmp/test-dash-prefix
          key: no-match-dash
          restore-keys: |
            -rf
          cache-dir: /tmp/local-cache

      - name: Verify dash restore-key produced a clean miss
        run: |
          [ "${{ steps.restore-dash-prefix.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for dash prefix, got: ${{ steps.restore-dash-prefix.outputs.cache-hit }}" && exit 1)
          [ -z "${{ steps.restore-dash-prefix.outputs.cache-matched-key }}" ] \
            || (echo "Expected empty cache-matched-key for dash prefix miss" && exit 1)
          [ ! -d /tmp/test-dash-prefix ] \
            || (echo "Expected path to not exist on dash prefix miss" && exit 1)
          echo "Dash prefix safety: OK"

      - name: Set up concurrent save fixture
        run: |
          mkdir -p /tmp/test-concurrent-a /tmp/test-concurrent-b
          echo "concurrent-a" > /tmp/test-concurrent-a/h.txt
          echo "concurrent-b" > /tmp/test-concurrent-b/h.txt

      - name: Concurrent saves — exactly one should win
        run: |
          # Both saves target the same key; the loser should skip cleanly.
          sh lib/cache-save.sh /tmp/test-concurrent-a concurrent-key /tmp/local-cache &
          sh lib/cache-save.sh /tmp/test-concurrent-b concurrent-key /tmp/local-cache &
          wait
          # Exactly one entry should exist, and it should not be corrupted.
          test -d /tmp/local-cache/entries/concurrent-key \
            || (echo "Expected concurrent-key entry to exist" && exit 1)
          test -f /tmp/local-cache/entries/concurrent-key/h.txt \
            || (echo "Expected h.txt in concurrent entry" && exit 1)
          echo "Concurrent save: OK"

      - name: Stale lock recovery — dead PID is recovered
        run: |
          # Create a lock with a PID that does not exist.
          mkdir -p /tmp/local-cache/.locks/stale-test-key.lock
          printf '99999999' > /tmp/local-cache/.locks/stale-test-key.lock/pid
          mkdir -p /tmp/test-stale-source
          echo "stale" > /tmp/test-stale-source/i.txt
          sh lib/cache-save.sh /tmp/test-stale-source stale-test-key /tmp/local-cache
          test -d /tmp/local-cache/entries/stale-test-key \
            || (echo "Expected stale-test-key entry after recovery" && exit 1)
          # Lock should be cleaned up.
          test ! -d /tmp/local-cache/.locks/stale-test-key.lock \
            || (echo "Expected stale lock to be removed" && exit 1)
          echo "Stale lock recovery: OK"

      - name: Stale lock recovery — missing PID file is recovered
        run: |
          # Create a lock directory with no PID file (simulates kill between
          # mkdir and PID write).
          mkdir -p /tmp/local-cache/.locks/no-pid-key.lock
          mkdir -p /tmp/test-no-pid-source
          echo "no-pid" > /tmp/test-no-pid-source/j.txt
          sh lib/cache-save.sh /tmp/test-no-pid-source no-pid-key /tmp/local-cache
          test -d /tmp/local-cache/entries/no-pid-key \
            || (echo "Expected no-pid-key entry after recovery" && exit 1)
          echo "Stale lock recovery (missing PID): OK"

      - name: Restore isolation — modifying restored files does not corrupt cache entry
        run: |
          # Save a known fixture.
          mkdir -p /tmp/test-isolation-src
          echo "original" > /tmp/test-isolation-src/data.txt
          sh lib/cache-save.sh /tmp/test-isolation-src isolation-key /tmp/local-cache

          # Restore and modify the restored copy.
          sh lib/cache-restore.sh /tmp/test-isolation-dst isolation-key /tmp/local-cache ""
          echo "modified" > /tmp/test-isolation-dst/data.txt

          # The cache entry must still contain the original content.
          cached=$(cat /tmp/local-cache/entries/isolation-key/data.txt)
          [ "$cached" = "original" ] \
            || (echo "Cache entry was corrupted: expected 'original', got '$cached'" && exit 1)
          echo "Restore isolation: OK"

      - name: Migration — hard-linked target is replaced on restore
        run: |
          # Simulate a legacy hard-link restore by linking a file from the
          # cache entry into a target directory.
          mkdir -p /tmp/test-migration-dst
          ln /tmp/local-cache/entries/isolation-key/data.txt /tmp/test-migration-dst/data.txt
          nlink=$(stat -c '%h' /tmp/test-migration-dst/data.txt 2>/dev/null \
                  || stat -f '%l' /tmp/test-migration-dst/data.txt)
          [ "$nlink" -gt 1 ] || (echo "Expected nlink > 1 for hard link" && exit 1)

          # Restore over the hard-linked target — should clear and replace.
          sh lib/cache-restore.sh /tmp/test-migration-dst isolation-key /tmp/local-cache ""
          nlink_after=$(stat -c '%h' /tmp/test-migration-dst/data.txt 2>/dev/null \
                        || stat -f '%l' /tmp/test-migration-dst/data.txt)
          # On ext4 (ubuntu-latest), the restored copy should have nlink=1.
          # On Btrfs it would also be 1 (reflink, not hard link).
          [ "$nlink_after" -eq 1 ] \
            || (echo "Expected nlink=1 after migration, got $nlink_after" && exit 1)

          # Cache entry must still be intact.
          cached=$(cat /tmp/local-cache/entries/isolation-key/data.txt)
          [ "$cached" = "original" ] \
            || (echo "Cache entry corrupted during migration: expected 'original', got '$cached'" && exit 1)
          echo "Hard-link migration: OK"
