name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Shellcheck
        run: shellcheck lib/cache-common.sh lib/cache-restore.sh lib/cache-save.sh

  # actionlint catches the inline `run:` shell blocks in this very workflow
  # that the standalone `shellcheck` job above does not see. Without this,
  # SC2012 / SC2015 / SC2086 issues in test fixtures slip past CI and only
  # surface when something else (a developer's local actionlint, a code
  # reviewer) happens to look. The download script is pinned to a specific
  # actionlint release commit to avoid supply-chain risk from tracking main.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/914e7df21a07ef503a81201c76d2b11c789d3fca/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

  integration-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Restore against non-existent cache dir (cold start)
        id: restore-cold
        uses: ./
        with:
          path: /tmp/test-cold-restore
          key: any-key
          cache-dir: /tmp/nonexistent-cache-dir

      - name: Verify cold start exits cleanly with miss
        run: |
          [ "${{ steps.restore-cold.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false on cold start, got: ${{ steps.restore-cold.outputs.cache-hit }}" && exit 1)
          [ ! -d /tmp/test-cold-restore ] \
            || (echo "Expected path to not exist on cold-start miss" && exit 1)
          echo "Cold start restore: OK"

      - name: Create test fixture
        run: |
          mkdir -p /tmp/test-source
          echo "hello" > /tmp/test-source/a.txt
          echo "world" > /tmp/test-source/b.txt
          mkdir -p /tmp/test-source/sub
          echo "nested" > /tmp/test-source/sub/c.txt

      - name: Save to local cache
        uses: ./save
        with:
          path: /tmp/test-source
          key: test-exact-key
          cache-dir: /tmp/local-cache

      - name: Verify entry was created
        run: |
          . lib/cache-common.sh
          encoded_key=$(encode_key 'test-exact-key')
          test -d "/tmp/local-cache/entries/${encoded_key}" || (echo "Entry not found" && exit 1)
          echo "Entry exists: OK"

      - name: Delete source to prove restore works
        run: rm -rf /tmp/test-source

      - name: Restore from local cache (exact)
        id: restore-exact
        uses: ./
        with:
          path: /tmp/test-restore
          key: test-exact-key
          cache-dir: /tmp/local-cache

      - name: Verify exact restore
        run: |
          [ "${{ steps.restore-exact.outputs.cache-hit }}" = "true" ] \
            || (echo "Expected cache-hit=true, got: ${{ steps.restore-exact.outputs.cache-hit }}" && exit 1)
          [ "${{ steps.restore-exact.outputs.cache-matched-key }}" = "test-exact-key" ] \
            || (echo "Expected cache-matched-key=test-exact-key, got: ${{ steps.restore-exact.outputs.cache-matched-key }}" && exit 1)
          . lib/cache-common.sh
          encoded_key=$(encode_key 'test-exact-key')
          diff -x .local-cache-restore -x .local-cache-key "/tmp/local-cache/entries/${encoded_key}" /tmp/test-restore \
            || (echo "Restored content does not match" && exit 1)
          echo "Exact restore: OK"

      - name: Restore with prefix key (miss on exact, hit on prefix)
        id: restore-prefix
        uses: ./
        with:
          path: /tmp/test-restore-prefix
          key: test-exact-key-v2
          restore-keys: |
            test-exact-key
          cache-dir: /tmp/local-cache

      - name: Verify prefix restore
        run: |
          [ "${{ steps.restore-prefix.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for prefix match, got: ${{ steps.restore-prefix.outputs.cache-hit }}" && exit 1)
          [ "${{ steps.restore-prefix.outputs.cache-matched-key }}" = "test-exact-key" ] \
            || (echo "Expected raw cache-matched-key=test-exact-key for prefix match, got: ${{ steps.restore-prefix.outputs.cache-matched-key }}" && exit 1)
          . lib/cache-common.sh
          encoded_key=$(encode_key 'test-exact-key')
          diff -x .local-cache-restore -x .local-cache-key "/tmp/local-cache/entries/${encoded_key}" /tmp/test-restore-prefix \
            || (echo "Prefix-restored content does not match" && exit 1)
          echo "Prefix restore: OK"

      - name: Restore with no match
        id: restore-miss
        uses: ./
        with:
          path: /tmp/test-restore-miss
          key: no-such-key
          cache-dir: /tmp/local-cache

      - name: Verify cache miss
        run: |
          [ "${{ steps.restore-miss.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for miss, got: ${{ steps.restore-miss.outputs.cache-hit }}" && exit 1)
          [ -z "${{ steps.restore-miss.outputs.cache-matched-key }}" ] \
            || (echo "Expected empty cache-matched-key on miss, got: ${{ steps.restore-miss.outputs.cache-matched-key }}" && exit 1)
          [ ! -d /tmp/test-restore-miss ] \
            || (echo "Expected path to not exist on miss" && exit 1)
          echo "Cache miss: OK"

      - name: Second save with same key is a no-op
        uses: ./save
        with:
          path: /tmp/test-restore
          key: test-exact-key
          cache-dir: /tmp/local-cache

      - name: Verify idempotent save
        run: |
          count=0
          for path in /tmp/local-cache/entries/*; do
            [ -e "$path" ] || continue
            count=$((count + 1))
          done
          [ "$count" = "1" ] \
            || (echo "Expected 1 cache entry, found: $count" && exit 1)
          echo "Idempotent save: OK"

      - name: Save with non-existent source path exits cleanly
        uses: ./save
        with:
          path: /tmp/this-path-does-not-exist
          key: nonexistent-source-key
          cache-dir: /tmp/local-cache

      - name: Verify non-existent source was not cached
        run: |
          . lib/cache-common.sh
          encoded_key=$(encode_key 'nonexistent-source-key')
          [ ! -d "/tmp/local-cache/entries/${encoded_key}" ] \
            || (echo "Expected no entry for non-existent source" && exit 1)
          echo "Non-existent source guard: OK"

      - name: Set up multi-prefix fixture
        run: |
          mkdir -p /tmp/test-multi-prefix
          echo "multi" > /tmp/test-multi-prefix/d.txt

      - name: Save multi-prefix fixture under second prefix
        uses: ./save
        with:
          path: /tmp/test-multi-prefix
          key: prefix-b-v1
          cache-dir: /tmp/local-cache

      - name: Restore with multiple restore-keys (first misses, second hits)
        id: restore-multi-prefix
        uses: ./
        with:
          path: /tmp/test-restore-multi-prefix
          key: no-match-at-all
          restore-keys: |
            prefix-a-
            prefix-b-
          cache-dir: /tmp/local-cache

      - name: Verify second prefix was used
        run: |
          [ "${{ steps.restore-multi-prefix.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for prefix match" && exit 1)
          [ "${{ steps.restore-multi-prefix.outputs.cache-matched-key }}" = "prefix-b-v1" ] \
            || (echo "Expected raw matched key prefix-b-v1, got: ${{ steps.restore-multi-prefix.outputs.cache-matched-key }}" && exit 1)
          . lib/cache-common.sh
          encoded_key=$(encode_key 'prefix-b-v1')
          diff -x .local-cache-restore -x .local-cache-key "/tmp/local-cache/entries/${encoded_key}" /tmp/test-restore-multi-prefix \
            || (echo "Multi-prefix restored content does not match" && exit 1)
          echo "Multi-prefix restore: OK"

      - name: Set up first-prefix-wins fixture
        run: |
          mkdir -p /tmp/test-prefix-a
          echo "from-prefix-a" > /tmp/test-prefix-a/e.txt

      - name: Save first-prefix-wins fixture under prefix-a
        uses: ./save
        with:
          path: /tmp/test-prefix-a
          key: prefix-a-v1
          cache-dir: /tmp/local-cache

      - name: Restore with multiple restore-keys (both match, first wins)
        id: restore-prefix-order
        uses: ./
        with:
          path: /tmp/test-restore-prefix-order
          key: no-match-at-all-2
          restore-keys: |
            prefix-a-
            prefix-b-
          cache-dir: /tmp/local-cache

      - name: Verify first prefix wins when both match
        run: |
          [ "${{ steps.restore-prefix-order.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for prefix match" && exit 1)
          # prefix-a- is listed first and has an entry; it must win over prefix-b-
          [ "${{ steps.restore-prefix-order.outputs.cache-matched-key }}" = "prefix-a-v1" ] \
            || (echo "Expected raw matched key prefix-a-v1, got: ${{ steps.restore-prefix-order.outputs.cache-matched-key }}" && exit 1)
          . lib/cache-common.sh
          encoded_key=$(encode_key 'prefix-a-v1')
          diff -x .local-cache-restore -x .local-cache-key "/tmp/local-cache/entries/${encoded_key}" /tmp/test-restore-prefix-order \
            || (echo "Expected prefix-a-v1 to win but content does not match" && exit 1)
          echo "First-prefix-wins: OK"

      - name: Set up key-sanitization fixture
        run: |
          mkdir -p /tmp/test-special-key
          echo "special" > /tmp/test-special-key/f.txt

      - name: Save with key containing special characters
        uses: ./save
        with:
          path: /tmp/test-special-key
          key: "my/special:key@v1"
          cache-dir: /tmp/local-cache

      - name: Verify encoded entry name on disk
        run: |
          . lib/cache-common.sh
          encoded_key=$(encode_key 'my/special:key@v1')
          [ -d "/tmp/local-cache/entries/${encoded_key}" ] \
            || (echo "Expected encoded entry ${encoded_key} not found" && exit 1)
          echo "Key encoding: OK"

      - name: Restore with special-character key (exact hit)
        id: restore-sanitized
        uses: ./
        with:
          path: /tmp/test-restore-sanitized
          key: "my/special:key@v1"
          cache-dir: /tmp/local-cache

      - name: Verify special-character key restores correctly
        run: |
          [ "${{ steps.restore-sanitized.outputs.cache-hit }}" = "true" ] \
            || (echo "Expected cache-hit=true for special-character key, got: ${{ steps.restore-sanitized.outputs.cache-hit }}" && exit 1)
          [ "${{ steps.restore-sanitized.outputs.cache-matched-key }}" = "my/special:key@v1" ] \
            || { echo "Expected raw key on exact hit, got: ${{ steps.restore-sanitized.outputs.cache-matched-key }}"; exit 1; }
          . lib/cache-common.sh
          encoded_key=$(encode_key 'my/special:key@v1')
          diff -x .local-cache-restore -x .local-cache-key "/tmp/local-cache/entries/${encoded_key}" /tmp/test-restore-sanitized \
            || (echo "Special-character key restore content mismatch" && exit 1)
          echo "Special-character key restore: OK"

      - name: Set up dotted-key fixture
        run: |
          mkdir -p /tmp/test-dotted-key-src /tmp/test-dotdot-key-src
          echo "dot" > /tmp/test-dotted-key-src/data.txt
          echo "dotdot" > /tmp/test-dotdot-key-src/data.txt

      - name: Dot key round-trips safely
        uses: ./save
        with:
          path: /tmp/test-dotted-key-src
          key: "."
          cache-dir: /tmp/local-cache
      - name: Verify dot key round-trip
        run: |
          . lib/cache-common.sh
          encoded_key=$(encode_key '.')
          [ -d "/tmp/local-cache/entries/${encoded_key}" ] \
            || (echo "Expected encoded dot-key entry ${encoded_key}" && exit 1)
          sh lib/cache-restore.sh /tmp/test-dotted-key-dst "." /tmp/local-cache ""
          [ "$(cat /tmp/test-dotted-key-dst/data.txt)" = "dot" ] \
            || (echo "Expected dot-key restore content" && exit 1)
          echo "Dot key support: OK"

      - name: Double-dot key round-trips safely
        uses: ./save
        with:
          path: /tmp/test-dotdot-key-src
          key: ".."
          cache-dir: /tmp/local-cache
      - name: Verify double-dot key round-trip
        run: |
          . lib/cache-common.sh
          encoded_key=$(encode_key '..')
          [ -d "/tmp/local-cache/entries/${encoded_key}" ] \
            || (echo "Expected encoded double-dot key entry ${encoded_key}" && exit 1)
          sh lib/cache-restore.sh /tmp/test-dotdot-key-dst ".." /tmp/local-cache ""
          [ "$(cat /tmp/test-dotdot-key-dst/data.txt)" = "dotdot" ] \
            || (echo "Expected double-dot key restore content" && exit 1)
          echo "Double-dot key support: OK"

      - name: Distinct raw keys with same old sanitized form stay distinct
        run: |
          mkdir -p /tmp/test-collision-a /tmp/test-collision-b
          echo "slash" > /tmp/test-collision-a/data.txt
          echo "colon" > /tmp/test-collision-b/data.txt

          sh lib/cache-save.sh /tmp/test-collision-a "a/b" /tmp/local-cache
          sh lib/cache-save.sh /tmp/test-collision-b "a:b" /tmp/local-cache

          . lib/cache-common.sh
          encoded_a=$(encode_key 'a/b')
          encoded_b=$(encode_key 'a:b')
          [ -d "/tmp/local-cache/entries/${encoded_a}" ] \
            || (echo "Missing encoded entry for a/b" && exit 1)
          [ -d "/tmp/local-cache/entries/${encoded_b}" ] \
            || (echo "Missing encoded entry for a:b" && exit 1)

          sh lib/cache-restore.sh /tmp/test-collision-out-a "a/b" /tmp/local-cache ""
          sh lib/cache-restore.sh /tmp/test-collision-out-b "a:b" /tmp/local-cache ""
          [ "$(cat /tmp/test-collision-out-a/data.txt)" = "slash" ] \
            || (echo "a/b restored wrong content" && exit 1)
          [ "$(cat /tmp/test-collision-out-b/data.txt)" = "colon" ] \
            || (echo "a:b restored wrong content" && exit 1)
          echo "Key collision regression: OK"

      - name: Dash-prefix restore-key is handled safely
        id: restore-dash-prefix
        uses: ./
        with:
          path: /tmp/test-dash-prefix
          key: no-match-dash
          restore-keys: |
            -rf
          cache-dir: /tmp/local-cache

      - name: Verify dash restore-key produced a clean miss
        run: |
          [ "${{ steps.restore-dash-prefix.outputs.cache-hit }}" = "false" ] \
            || (echo "Expected cache-hit=false for dash prefix, got: ${{ steps.restore-dash-prefix.outputs.cache-hit }}" && exit 1)
          [ -z "${{ steps.restore-dash-prefix.outputs.cache-matched-key }}" ] \
            || (echo "Expected empty cache-matched-key for dash prefix miss" && exit 1)
          [ ! -d /tmp/test-dash-prefix ] \
            || (echo "Expected path to not exist on dash prefix miss" && exit 1)
          echo "Dash prefix safety: OK"

      # Sequential idempotent save: verify that a save against an already-
      # populated entry exits cleanly without touching the existing content.
      # This does NOT exercise parallel mutex contention — real contention is
      # tested by curlewlabs-com/local-mutex in its own repo. What it does
      # exercise is the re-check inside cache-save.sh that makes the waiter
      # path safe: once the entry exists, a second caller (whether arriving
      # after a lock release or just running later in the same job) must
      # detect the existing entry and skip the rsync+mv entirely. The
      # regression this guards is NOT clobbering — it is nesting. POSIX
      # `mv src dest` where dest is an existing directory moves src to
      # dest/basename(src) rather than failing, so a removed re-check would
      # leave the second writer's staging dir nested as
      # entries/<key>/.tmp-<key>-<pid>/ alongside the first writer's top-
      # level files. The content check alone would not catch this (the
      # top-level file still reads "first"), so we also assert that no
      # nested .tmp-* staging subdir survived the second save.
      - name: Set up idempotent-save fixture
        run: |
          mkdir -p /tmp/test-idempotent-first /tmp/test-idempotent-second
          echo "first" > /tmp/test-idempotent-first/h.txt
          echo "second" > /tmp/test-idempotent-second/h.txt

      - name: Save establishes the entry
        uses: ./save
        with:
          path: /tmp/test-idempotent-first
          key: idempotent-key
          cache-dir: /tmp/local-cache

      - name: Second save against existing entry exits cleanly
        uses: ./save
        with:
          path: /tmp/test-idempotent-second
          key: idempotent-key
          cache-dir: /tmp/local-cache

      - name: Verify the first writer's content survived
        run: |
          # The existing-entry guard must let the second save exit before
          # touching the existing entry — so the first writer's content
          # is what stays on disk.
          . lib/cache-common.sh
          encoded_key=$(encode_key 'idempotent-key')
          content=$(cat "/tmp/local-cache/entries/${encoded_key}/h.txt")
          [ "$content" = "first" ] \
            || (echo "Existing-entry guard failed: expected 'first', got '$content'" && exit 1)
          # The content check above would still pass if the guard regressed,
          # because the second writer's content gets nested inside the entry
          # rather than overwriting the top-level file. Assert that no nested
          # staging dir survived: this is what actually catches a removed
          # re-check guard.
          test -z "$(find "/tmp/local-cache/entries/${encoded_key}" -name '.tmp-*')" \
            || { echo "Re-check regressed: found nested staging dir inside entry"; exit 1; }
          echo "Sequential idempotent save: OK"

      # The "v2:" prefix in these marker assertions is the canonical marker
      # version from lib/cache-restore.sh (MARKER_VERSION). If that constant
      # is ever bumped, the literals below must be bumped in lockstep.
      - name: Restore writes v2 marker
        run: |
          mkdir -p /tmp/test-marker-src
          echo "marker-test" > /tmp/test-marker-src/data.txt
          sh lib/cache-save.sh /tmp/test-marker-src marker-key /tmp/local-cache
          sh lib/cache-restore.sh /tmp/test-marker-dst marker-key /tmp/local-cache ""
          marker=$(cat /tmp/test-marker-dst/.local-cache-restore)
          [ "$marker" = "v2:marker-key" ] \
            || (echo "Expected marker 'v2:marker-key', got '$marker'" && exit 1)
          echo "Marker written: OK"

      - name: Second restore with same key is skipped
        run: |
          # Modify the restored content — if restore skips, this survives.
          echo "modified" > /tmp/test-marker-dst/data.txt
          sh lib/cache-restore.sh /tmp/test-marker-dst marker-key /tmp/local-cache ""
          content=$(cat /tmp/test-marker-dst/data.txt)
          [ "$content" = "modified" ] \
            || (echo "Expected 'modified' (skipped restore), got '$content'" && exit 1)
          echo "Same-key skip: OK"

      - name: Restore with different key replaces content
        run: |
          mkdir -p /tmp/test-newkey-src
          echo "new-content" > /tmp/test-newkey-src/data.txt
          sh lib/cache-save.sh /tmp/test-newkey-src new-marker-key /tmp/local-cache
          # Restore new key into the same target that has the old marker.
          sh lib/cache-restore.sh /tmp/test-marker-dst new-marker-key /tmp/local-cache ""
          content=$(cat /tmp/test-marker-dst/data.txt)
          [ "$content" = "new-content" ] \
            || (echo "Expected 'new-content', got '$content'" && exit 1)
          marker=$(cat /tmp/test-marker-dst/.local-cache-restore)
          [ "$marker" = "v2:new-marker-key" ] \
            || (echo "Expected updated marker, got '$marker'" && exit 1)
          echo "Different-key replace: OK"

      - name: v1 target (no marker) is replaced on restore
        run: |
          # Simulate a v1 restore — content exists but no marker file.
          mkdir -p /tmp/test-v1-target
          echo "v1-content" > /tmp/test-v1-target/data.txt
          sh lib/cache-restore.sh /tmp/test-v1-target marker-key /tmp/local-cache ""
          content=$(cat /tmp/test-v1-target/data.txt)
          [ "$content" = "marker-test" ] \
            || (echo "Expected 'marker-test' from cache, got '$content'" && exit 1)
          [ -f /tmp/test-v1-target/.local-cache-restore ] \
            || (echo "Expected v2 marker after migration" && exit 1)
          echo "v1 migration: OK"

      - name: Restore isolation — modifying restored files does not corrupt cache
        run: |
          sh lib/cache-restore.sh /tmp/test-isolation-dst marker-key /tmp/local-cache ""
          echo "corrupted" > /tmp/test-isolation-dst/data.txt
          . lib/cache-common.sh
          encoded_key=$(encode_key 'marker-key')
          cached=$(cat "/tmp/local-cache/entries/${encoded_key}/data.txt")
          [ "$cached" = "marker-test" ] \
            || (echo "Cache entry corrupted: expected 'marker-test', got '$cached'" && exit 1)
          echo "Restore isolation: OK"

      - name: Concurrent restores — each consumer gets an isolated copy
        run: |
          mkdir -p /tmp/test-concurrent-restore-src
          echo "shared" > /tmp/test-concurrent-restore-src/data.txt
          sh lib/cache-save.sh /tmp/test-concurrent-restore-src concurrent-restore-key /tmp/local-cache

          sh lib/cache-restore.sh /tmp/concurrent-dst-a concurrent-restore-key /tmp/local-cache "" &
          sh lib/cache-restore.sh /tmp/concurrent-dst-b concurrent-restore-key /tmp/local-cache "" &
          wait

          [ "$(cat /tmp/concurrent-dst-a/data.txt)" = "shared" ] \
            || (echo "Concurrent restore A has wrong content" && exit 1)
          [ "$(cat /tmp/concurrent-dst-b/data.txt)" = "shared" ] \
            || (echo "Concurrent restore B has wrong content" && exit 1)

          echo "modified-a" > /tmp/concurrent-dst-a/data.txt
          [ "$(cat /tmp/concurrent-dst-b/data.txt)" = "shared" ] \
            || (echo "Modifying A corrupted B" && exit 1)
          . lib/cache-common.sh
          encoded_key=$(encode_key 'concurrent-restore-key')
          [ "$(cat "/tmp/local-cache/entries/${encoded_key}/data.txt")" = "shared" ] \
            || (echo "Modifying A corrupted cache entry" && exit 1)
          echo "Concurrent restore isolation: OK"

      # A second prefix restore against an already-populated target must hit
      # the marker-skip branch in cache-restore.sh (is_current on the
      # is_exact="false" path). Existing tests cover exact-hit-skip and
      # prefix-match-first-time, but not this second-call-is-skipped case —
      # which is the steady-state behavior for the README's restore → install
      # → save pattern when the caller's exact key is slightly newer than the
      # fallback. If this branch regresses, the restore silently starts doing
      # full rsync work on every invocation instead of constant-time work.
      - name: Second prefix restore against populated target is a marker-skip
        run: |
          mkdir -p /tmp/test-prefix-marker-src
          echo "v1-content" > /tmp/test-prefix-marker-src/data.txt
          sh lib/cache-save.sh /tmp/test-prefix-marker-src prefix-marker-v1 /tmp/local-cache

          # First prefix restore populates the target with marker "v2:prefix-marker-v1".
          # The caller's exact key (v2) doesn't exist; restore-keys "prefix-marker-"
          # resolves to the only matching entry (v1).
          sh lib/cache-restore.sh /tmp/test-prefix-marker-dst prefix-marker-v2 /tmp/local-cache "prefix-marker-"
          marker=$(cat /tmp/test-prefix-marker-dst/.local-cache-restore)
          [ "$marker" = "v2:prefix-marker-v1" ] \
            || (echo "Expected marker 'v2:prefix-marker-v1' after first prefix restore, got '$marker'" && exit 1)

          # Modify the restored content — if the second restore skips via
          # marker-match, this modification survives (no rsync overwrite).
          # Same pattern as the "Second restore with same key is skipped" test,
          # but on the prefix-resolution branch.
          echo "modified-between-restores" > /tmp/test-prefix-marker-dst/data.txt
          sh lib/cache-restore.sh /tmp/test-prefix-marker-dst prefix-marker-v2 /tmp/local-cache "prefix-marker-"
          content=$(cat /tmp/test-prefix-marker-dst/data.txt)
          [ "$content" = "modified-between-restores" ] \
            || (echo "Second prefix restore did not hit marker-skip: expected 'modified-between-restores', got '$content'" && exit 1)
          echo "Prefix restore marker-skip: OK"

      # When a caller runs the README's canonical pattern (restore → install
      # → save on the same path) and the restore was a prefix hit, the target
      # ends up with a .local-cache-restore marker pointing at the matched
      # entry. The save step must exclude that marker from the new entry on
      # disk, or else every cache entry that was ever populated via a prefix
      # hit permanently carries a stale marker for the entry it was cloned
      # from. Harmless at runtime but pollutes cache entries with stale
      # metadata.
      - name: Save after prefix restore excludes restore marker
        run: |
          mkdir -p /tmp/test-save-exclude-src
          echo "source" > /tmp/test-save-exclude-src/data.txt
          sh lib/cache-save.sh /tmp/test-save-exclude-src save-exclude-v1 /tmp/local-cache

          # Prefix restore leaves the marker file in the target.
          sh lib/cache-restore.sh /tmp/test-save-exclude-dst save-exclude-v2 /tmp/local-cache "save-exclude-"
          [ -f /tmp/test-save-exclude-dst/.local-cache-restore ] \
            || (echo "Expected marker in target after prefix restore" && exit 1)

          # Save under the caller's exact key. The new entry must not contain
          # the stale marker from the prefix hit.
          sh lib/cache-save.sh /tmp/test-save-exclude-dst save-exclude-v2 /tmp/local-cache
          . lib/cache-common.sh
          encoded_key=$(encode_key 'save-exclude-v2')
          [ -d "/tmp/local-cache/entries/${encoded_key}" ] \
            || (echo "Expected new entry save-exclude-v2" && exit 1)
          [ ! -f "/tmp/local-cache/entries/${encoded_key}/.local-cache-restore" ] \
            || (echo "rsync did not exclude marker — new entry contains stale marker from prefix source" && exit 1)
          [ -f "/tmp/local-cache/entries/${encoded_key}/.local-cache-key" ] \
            || { echo "Expected metadata file in encoded entry"; exit 1; }
          [ -f "/tmp/local-cache/entries/${encoded_key}/data.txt" ] \
            || (echo "Expected data.txt in new entry" && exit 1)
          echo "Save excludes restore marker: OK"

      # Verify the two-phase restore logic introduced for parallel hits
      - name: Set up two-phase logic fixture
        run: |
          mkdir -p /tmp/two-phase-src
          echo "phase-data" > /tmp/two-phase-src/data.txt
          sh lib/cache-save.sh /tmp/two-phase-src phase-v1 /tmp/local-cache-2

      - name: Phase 1 (Quick Check) reports skip-lock for steady-state exact hit
        run: |
          # 1. Populate the target with the exact key
          sh lib/cache-restore.sh /tmp/two-phase-dst phase-v1 /tmp/local-cache-2 ""
          
          # 2. Run Phase 1 check
          out=$(mktemp)
          GITHUB_OUTPUT="$out" sh lib/cache-restore.sh --check /tmp/two-phase-dst phase-v1 /tmp/local-cache-2 ""
          
          # 3. Verify skip-lock is emitted
          grep "skip-lock=true" "$out" || (echo "Expected skip-lock=true for steady-state exact hit" && exit 1)
          echo "Phase 1 skip-lock (exact hit): OK"

      - name: Phase 1 (Quick Check) reports skip-lock for steady-state prefix hit
        run: |
          # 1. Populate target with phase-v1
          sh lib/cache-restore.sh /tmp/two-phase-dst-prefix phase-v1 /tmp/local-cache-2 ""
          
          # 2. Run check with key phase-v2 and restore-keys phase-v1
          out=$(mktemp)
          GITHUB_OUTPUT="$out" sh lib/cache-restore.sh --check /tmp/two-phase-dst-prefix phase-v2 /tmp/local-cache-2 "phase-"
          
          # 3. Verify skip-lock is emitted (target already has the matched content)
          grep "skip-lock=true" "$out" || (echo "Expected skip-lock=true for steady-state prefix hit" && exit 1)
          echo "Phase 1 skip-lock (prefix hit): OK"

      - name: Phase 1 (Quick Check) signals lock for cold prefix hit
        run: |
          # 1. Cache has phase-v1. Target is EMPTY.
          # 2. Run check with key phase-v2 and restore-keys phase-v1
          out=$(mktemp)
          GITHUB_OUTPUT="$out" sh lib/cache-restore.sh --check /tmp/two-phase-dst-cold-prefix phase-v2 /tmp/local-cache-2 "phase-"
          
          # 3. Verify skip-lock is NOT emitted (rsync is required)
          if grep "skip-lock=true" "$out"; then
            echo "Expected no skip-lock for cold prefix hit" && exit 1
          fi
          echo "Phase 1 lock signaling (cold prefix hit): OK"

      - name: Phase 1 (Quick Check) signals lock required for miss
        run: |
          out=$(mktemp)
          GITHUB_OUTPUT="$out" sh lib/cache-restore.sh --check /tmp/two-phase-dst-miss phase-miss /tmp/local-cache-2 ""
          
          # Verify skip-lock is NOT emitted
          if grep "skip-lock=true" "$out"; then
            echo "Expected no skip-lock for miss" && exit 1
          fi
          echo "Phase 1 lock signaling (miss): OK"

      - name: Verify LOCAL_CACHE_HIT in --check steady-state path
        run: |
          # The --check path's is_current early return must also write GITHUB_ENV.
          # First populate a target so the marker exists.
          sh lib/cache-restore.sh /tmp/two-env-dst-check phase-v1 /tmp/local-cache-2 ""

          # Now run --check against the same target — marker matches, so
          # this hits the is_current block and should still write GITHUB_ENV.
          out=$(mktemp)
          env_out=$(mktemp)
          GITHUB_OUTPUT="$out" GITHUB_ENV="$env_out" sh lib/cache-restore.sh --check /tmp/two-env-dst-check phase-v1 /tmp/local-cache-2 ""
          grep "LOCAL_CACHE_HIT=true" "$env_out" || (echo "Expected LOCAL_CACHE_HIT=true in --check steady-state path" && exit 1)
          grep "LOCAL_CACHE_MATCHED_KEY=phase-v1" "$env_out" || (echo "Expected LOCAL_CACHE_MATCHED_KEY in --check steady-state path" && exit 1)
          echo "LOCAL_CACHE_HIT in --check steady-state path: OK"

      - name: Verify LOCAL_CACHE_HIT environment variable correctness
        run: |
          # 1. Exact Hit
          out=$(mktemp)
          env_out=$(mktemp)
          GITHUB_OUTPUT="$out" GITHUB_ENV="$env_out" sh lib/cache-restore.sh /tmp/two-env-dst-exact phase-v1 /tmp/local-cache-2 ""
          grep "LOCAL_CACHE_HIT=true" "$env_out" || (echo "Expected LOCAL_CACHE_HIT=true for exact hit" && exit 1)
          
          # 2. Prefix Hit (must be false to trigger save step)
          out=$(mktemp)
          env_out=$(mktemp)
          GITHUB_OUTPUT="$out" GITHUB_ENV="$env_out" sh lib/cache-restore.sh /tmp/two-env-dst-prefix phase-v2 /tmp/local-cache-2 "phase-"
          grep "LOCAL_CACHE_HIT=false" "$env_out" || (echo "Expected LOCAL_CACHE_HIT=false for prefix hit" && exit 1)
          
          # 3. Miss
          out=$(mktemp)
          env_out=$(mktemp)
          GITHUB_OUTPUT="$out" GITHUB_ENV="$env_out" sh lib/cache-restore.sh /tmp/two-env-dst-miss phase-miss /tmp/local-cache-2 ""
          grep "LOCAL_CACHE_HIT=false" "$env_out" || (echo "Expected LOCAL_CACHE_HIT=false for miss" && exit 1)
          echo "LOCAL_CACHE_HIT environment logic: OK"

      - name: Verify Full Action Output Mapping
        id: action-output-test
        uses: ./
        with:
          path: /tmp/two-action-dst
          key: phase-v1
          cache-dir: /tmp/local-cache-2
      
      - name: Assert Action Outputs
        run: |
          [ "${{ steps.action-output-test.outputs.cache-hit }}" = "true" ] || (echo "Action output cache-hit mismatch" && exit 1)
          [ "${{ steps.action-output-test.outputs.cache-matched-key }}" = "phase-v1" ] || (echo "Action output matched-key mismatch" && exit 1)
          echo "Action output mapping: OK"

      # ─── Mutex name collision resistance ─────────────────────────────────

      # The mutex name used by save/action.yml is derived from the
      # SHA-256 of the raw key (via hash_key in lib/cache-common.sh),
      # not the raw key itself. local-mutex would otherwise truncate
      # long keys to 200 chars and sanitize characters outside
      # [a-zA-Z0-9._-] to underscores — two distinct keys that differ
      # only past char 200, or only in sanitized characters, would
      # then share a lock file even though their storage entries do
      # not collide (storage is already SHA-256-keyed).
      #
      # local-mutex keeps its lockfile at /tmp/local-mutex-<sanitized>.lock
      # with `lockf -k`, so after a save the file persists and can be
      # inspected to verify which mutex name was used.
      - name: Set up mutex-name fixture
        run: |
          rm -f /tmp/local-mutex-cache-save-*.lock
          mkdir -p /tmp/mutex-name-src
          echo "content" > /tmp/mutex-name-src/data.txt

      - name: Save to exercise the mutex-name prep step
        uses: ./save
        with:
          path: /tmp/mutex-name-src
          key: mutex-name-verification-key
          cache-dir: /tmp/mutex-name-cache

      - name: Mutex name is SHA-256 of key, not raw key
        run: |
          . lib/cache-common.sh
          expected_hash=$(hash_key 'mutex-name-verification-key')
          expected_lock="/tmp/local-mutex-cache-save-${expected_hash}.lock"
          test -f "$expected_lock" \
            || (echo "Expected SHA-256 lockfile at $expected_lock; found:" \
                && ls -la /tmp/local-mutex-cache-save-*.lock 2>/dev/null \
                && exit 1)
          # Old behavior would leave a lockfile with the raw-key name.
          # That file must NOT exist, even post-fix.
          test ! -f "/tmp/local-mutex-cache-save-mutex-name-verification-key.lock" \
            || (echo "Raw-key lockfile leaked — mutex regressed to raw key" && exit 1)
          rm -f /tmp/local-mutex-cache-save-*.lock
          rm -rf /tmp/mutex-name-src /tmp/mutex-name-cache
          echo "Mutex name uses SHA-256 of key: OK"

      # Two long keys that would collide under local-mutex's
      # sanitize-and-truncate-to-200 sanitization must produce distinct
      # mutex lockfiles after the SHA-256 fix. Builds two 250-char keys
      # with an identical 200-char prefix and different tails.
      - name: Long keys with matching 200-char prefix don't share a mutex
        run: |
          rm -f /tmp/local-mutex-cache-save-*.lock

          key_prefix=$(printf 'x%.0s' $(seq 1 200))
          key_a="${key_prefix}-alpha-tail-unique-suffix"
          key_b="${key_prefix}-beta-tail-unique-suffix"

          # Sanity check the test setup: these two keys share the first
          # 200 chars, so under the old raw-key mutex scheme they would
          # collide after local-mutex truncated to 200.
          [ "$(printf '%s' "$key_a" | head -c 200)" = "$(printf '%s' "$key_b" | head -c 200)" ] \
            || (echo "Test setup wrong: keys should share 200-char prefix" && exit 1)

          mkdir -p /tmp/long-key-a /tmp/long-key-b /tmp/long-key-cache
          echo a > /tmp/long-key-a/data.txt
          echo b > /tmp/long-key-b/data.txt

          sh lib/cache-save.sh /tmp/long-key-a "$key_a" /tmp/long-key-cache
          sh lib/cache-save.sh /tmp/long-key-b "$key_b" /tmp/long-key-cache

          # cache-save.sh itself doesn't touch local-mutex (the action.yml
          # layer does), so to verify the mutex naming we compute the
          # expected SHA-256-derived names directly and assert they differ.
          . lib/cache-common.sh
          hash_a=$(hash_key "$key_a")
          hash_b=$(hash_key "$key_b")
          [ "$hash_a" != "$hash_b" ] \
            || (echo "Hashes collided for supposedly-distinct keys" && exit 1)

          # Both encoded storage entries must exist and be distinct — this
          # is already a v3 invariant but confirming here documents that the
          # same collision-resistance used for storage is now also used for
          # the mutex.
          encoded_a=$(encode_key "$key_a")
          encoded_b=$(encode_key "$key_b")
          [ "$encoded_a" != "$encoded_b" ] \
            || (echo "Encoded storage keys collided" && exit 1)
          test -d "/tmp/long-key-cache/entries/${encoded_a}" \
            || (echo "Missing entry for key A" && exit 1)
          test -d "/tmp/long-key-cache/entries/${encoded_b}" \
            || (echo "Missing entry for key B" && exit 1)

          rm -rf /tmp/long-key-a /tmp/long-key-b /tmp/long-key-cache
          echo "Long keys with colliding 200-char prefix stay distinct: OK"
