name: 'Runner Local Cache (Save)'
description: >-
  Save a directory to the local disk cache on self-hosted runners.
  Call this after your install step, conditional on a cache miss from
  the restore step (curlewlabs-com/local-cache).
author: 'curlewlabs-com'
branding:
  icon: 'hard-drive'
  color: 'blue'

inputs:
  path:
    description: 'Path to the directory to save.'
    required: true
  key:
    description: 'Cache key to save under. Must match the key used in the restore step.'
    required: true
  cache-dir:
    description: >-
      Absolute path to local directory where cache entries are stored. Must
      match the value used in the restore step, and must be persistent and
      shared across all runners on the same machine (e.g. a path outside the
      per-workspace _work directory). Tilde expansion is not supported.
    required: true

runs:
  using: 'composite'
  steps:
    # Compute a collision-safe mutex name by hashing the raw key with
    # SHA-256. local-mutex sanitizes and truncates its `name` to 200
    # chars for the lockfile basename; raw interpolation of long keys
    # could cause two distinct keys to share a mutex even though their
    # storage entries — already SHA-256-keyed — would not. Hashing here
    # keeps mutex and storage collision-resistance identical.
    - name: Compute mutex name
      id: mutex-name
      shell: sh
      env:
        INPUT_KEY: ${{ inputs.key }}
      run: |
        . "${{ github.action_path }}/../lib/cache-common.sh"
        printf 'name=cache-save-%s\n' "$(hash_key "$INPUT_KEY")" >> "$GITHUB_OUTPUT"

    # Concurrent saves of the same key are serialized through local-mutex
    # so that two runners writing the same entry never collide. The mutex
    # is per-key (the lock name is the SHA-256 of the cache key), so
    # saves of different keys still run in parallel. The kernel releases
    # the lock automatically on process death — including SIGKILL, OOM
    # kill, and machine reboot — which is why local-mutex needs no PID
    # tracking or stale-lock recovery code.
    #
    # Pinned to the immutable patch tag (not the floating major `@v2`)
    # so a local-cache@v3 consumer sees deterministic behavior across
    # reruns. See AGENTS.md for the split-rule rationale.
    - name: Save cache
      uses: curlewlabs-com/local-mutex@v2.0.0
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_KEY: ${{ inputs.key }}
        INPUT_CACHE_DIR: ${{ inputs.cache-dir }}
        SAVE_SCRIPT: ${{ github.action_path }}/../lib/cache-save.sh
      with:
        name: ${{ steps.mutex-name.outputs.name }}
        run: |
          sh "$SAVE_SCRIPT" \
            "$INPUT_PATH" \
            "$INPUT_KEY" \
            "$INPUT_CACHE_DIR"
