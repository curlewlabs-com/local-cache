name: 'Runner Local Cache (Save)'
description: >-
  Save a directory to the local disk cache on self-hosted runners.
  Call this after your install step, conditional on a cache miss from
  the restore step (curlewlabs-com/local-cache).
author: 'curlewlabs-com'
branding:
  icon: 'hard-drive'
  color: 'blue'

inputs:
  path:
    description: 'Path to the directory to save.'
    required: true
  key:
    description: 'Cache key to save under. Must match the key used in the restore step.'
    required: true
  cache-dir:
    description: >-
      Absolute path to local directory where cache entries are stored. Must
      match the value used in the restore step, and must be persistent and
      shared across all runners on the same machine (e.g. a path outside the
      per-workspace _work directory). Tilde expansion is not supported.
    required: true

runs:
  using: 'composite'
  steps:
    # Concurrent saves of the same key are serialized through local-mutex
    # so that two runners writing the same entry never collide. The mutex
    # is per-key (the lock name includes the cache key), so saves of
    # different keys still run in parallel. The kernel releases the lock
    # automatically on process death — including SIGKILL, OOM kill, and
    # machine reboot — which is why local-mutex needs no PID tracking or
    # stale-lock recovery code.
    #
    # Pinned to the immutable patch tag (not the floating major `@v2`)
    # so a local-cache@v3 consumer sees deterministic behavior across
    # reruns. See AGENTS.md for the rationale.
    - name: Save cache
      uses: curlewlabs-com/local-mutex@v2.0.1
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_KEY: ${{ inputs.key }}
        INPUT_CACHE_DIR: ${{ inputs.cache-dir }}
        SAVE_SCRIPT: ${{ github.action_path }}/../lib/cache-save.sh
      with:
        # The key is interpolated into the lock name so saves of different
        # keys do not block each other. local-mutex v2.0.1+ hashes its
        # name input with SHA-256 to form the lockfile basename, so
        # distinct keys always map to distinct locks regardless of length
        # or byte content — no sanitization or truncation that could
        # collapse two different keys to the same lockfile.
        name: cache-save-${{ inputs.key }}
        run: |
          sh "$SAVE_SCRIPT" \
            "$INPUT_PATH" \
            "$INPUT_KEY" \
            "$INPUT_CACHE_DIR"
